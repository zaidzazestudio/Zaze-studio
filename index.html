<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaze Studio — Web Design & Development</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #0a0a0a;
      --white: #f5f2ed;
      --pure: #ffffff;
      --border: rgba(255,255,255,0.08);
      --dim: rgba(255,255,255,0.4);
      --dimmer: rgba(255,255,255,0.22);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; cursor: none; }

    /* CURSOR */
    .cursor { position: fixed; width: 9px; height: 9px; background: var(--pure); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: transform .15s ease; }
    .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(255,255,255,.25); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); }

    /* NOISE */
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); background-size:200px 200px; pointer-events:none; z-index:9997; opacity:.5; }

    /* LANG BAR */
    .lang-bar { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; justify-content:flex-end; padding:10px 60px 0; pointer-events:none; }
    .lang-switcher { display:flex; gap:2px; pointer-events:all; background:rgba(10,10,10,.9); border:1px solid var(--border); padding:4px; }
    .lang-btn { font-family:'Syne',sans-serif; font-size:.63rem; letter-spacing:.12em; text-transform:uppercase; padding:6px 14px; background:transparent; border:none; color:var(--dimmer); cursor:none; transition:all .25s; }
    .lang-btn:hover { color:var(--pure); }
    .lang-btn.active { background:var(--pure); color:var(--black); }

    /* NAV */
    nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:30px 60px; backdrop-filter:blur(20px); background:rgba(10,10,10,.75); border-bottom:1px solid var(--border); }
    .logo { display:flex; align-items:center; gap:14px; text-decoration:none; }
    .logo-svg { width:38px; height:38px; }
    .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:1.05rem; letter-spacing:.18em; color:var(--pure); text-transform:uppercase; }
    .logo-text span { color:rgba(255,255,255,.35); font-weight:400; }
    nav ul { list-style:none; display:flex; gap:44px; }
    nav ul li a { font-family:'DM Sans',sans-serif; font-size:.77rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); text-decoration:none; transition:color .3s; }
    nav ul li a:hover { color:var(--pure); }
    .nav-cta { color:var(--pure) !important; border:1px solid rgba(255,255,255,.25) !important; padding:10px 22px; transition:all .3s !important; }
    .nav-cta:hover { background:var(--pure) !important; color:var(--black) !important; }

    /* HERO */
    #hero { min-height:100vh; display:flex; align-items:center; position:relative; padding:0 60px; overflow:hidden; }
    .hero-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px); background-size:80px 80px; }
    .hero-glow { position:absolute; top:-20%; right:-10%; width:700px; height:700px; background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 65%); border-radius:50%; }
    .hero-content { position:relative; z-index:2; max-width:900px; }
    .hero-eyebrow { display:inline-flex; align-items:center; gap:12px; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:var(--dim); margin-bottom:36px; opacity:0; animation:fadeUp 1s .3s forwards; }
    .hero-eyebrow::before { content:''; display:block; width:40px; height:1px; background:rgba(255,255,255,.3); }
    .hero-title { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(3.5rem,8vw,7rem); line-height:.95; letter-spacing:-.02em; margin-bottom:32px; opacity:0; animation:fadeUp 1s .5s forwards; }
    .hero-title em { font-style:italic; color:rgba(255,255,255,.45); }
    .hero-title .line { display:block; }
    .hero-sub { font-weight:300; font-size:1rem; line-height:1.75; color:rgba(255,255,255,.42); max-width:460px; margin-bottom:52px; opacity:0; animation:fadeUp 1s .7s forwards; }
    .hero-actions { display:flex; gap:20px; align-items:center; opacity:0; animation:fadeUp 1s .9s forwards; }
    .btn-primary { font-family:'Syne',sans-serif; font-size:.77rem; letter-spacing:.12em; text-transform:uppercase; background:var(--pure); color:var(--black); padding:16px 36px; text-decoration:none; font-weight:700; transition:all .3s; }
    .btn-primary:hover { opacity:.85; transform:translateY(-2px); }
    .btn-ghost { font-family:'Syne',sans-serif; font-size:.77rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.45); text-decoration:none; display:flex; align-items:center; gap:10px; transition:all .3s; }
    .btn-ghost:hover { color:var(--pure); gap:16px; }
    .btn-ghost::after { content:'→'; }
    .hero-scroll { position:absolute; bottom:40px; left:60px; display:flex; align-items:center; gap:14px; font-size:.68rem; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.22); opacity:0; animation:fadeUp 1s 1.2s forwards; }
    .scroll-line { width:40px; height:1px; background:rgba(255,255,255,.1); position:relative; overflow:hidden; }
    .scroll-line::after { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:var(--pure); animation:scrollAnim 2s 1.5s infinite; }

    /* MARQUEE */
    .marquee-section { padding:26px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); overflow:hidden; }
    .marquee-track { display:flex; animation:marquee 30s linear infinite; white-space:nowrap; }
    .marquee-item { display:inline-flex; align-items:center; gap:24px; padding:0 28px; font-family:'Syne',sans-serif; font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.25); }
    .marquee-dot { width:3px; height:3px; background:rgba(255,255,255,.25); border-radius:50%; flex-shrink:0; }

    /* COMMON */
    .section-label { display:inline-flex; align-items:center; gap:12px; font-size:.68rem; letter-spacing:.26em; text-transform:uppercase; color:var(--dimmer); margin-bottom:28px; }
    .section-label::before { content:''; width:28px; height:1px; background:rgba(255,255,255,.25); }
    .section-title { font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(2.4rem,4vw,3.6rem); line-height:1.1; margin-bottom:26px; }
    .section-title em { font-style:italic; color:rgba(255,255,255,.42); }
    .section-body { font-weight:300; font-size:.95rem; line-height:1.8; color:rgba(255,255,255,.42); margin-bottom:18px; }

    /* ABOUT */
    #about { padding:140px 60px; display:grid; grid-template-columns:1fr 1fr; gap:100px; align-items:center; }
    .about-stats { display:grid; grid-template-columns:1fr 1fr; gap:2px; margin-top:20px; }
    .stat-box { padding:28px 30px; background:rgba(255,255,255,.02); border:1px solid var(--border); }
    .stat-num { font-family:'Cormorant Garamond',serif; font-size:2.8rem; font-weight:300; color:var(--pure); line-height:1; margin-bottom:7px; }
    .stat-label { font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.28); }
    .about-card { background:rgba(255,255,255,.02); border:1px solid var(--border); padding:48px; position:relative; }
    .about-card::before { content:''; position:absolute; top:0; left:0; width:48px; height:1px; background:var(--pure); }
    .about-card-title { font-family:'Syne',sans-serif; font-size:.67rem; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,.3); margin-bottom:32px; }
    .process-step { display:flex; gap:20px; margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.05); }
    .process-step:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .step-num { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:rgba(255,255,255,.18); min-width:28px; padding-top:2px; }
    .step-content h4 { font-family:'Syne',sans-serif; font-size:.84rem; font-weight:600; letter-spacing:.04em; margin-bottom:5px; }
    .step-content p { font-size:.82rem; color:rgba(255,255,255,.38); line-height:1.6; }

    /* SERVICES */
    #services { padding:140px 60px; border-top:1px solid var(--border); }
    .services-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:68px; }
    .services-header-left { max-width:520px; }
    .services-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
    .service-card { padding:42px 36px; background:rgba(255,255,255,.02); border:1px solid var(--border); position:relative; overflow:hidden; transition:all .4s; cursor:default; }
    .service-card:hover { border-color:rgba(255,255,255,.18); transform:translateY(-4px); background:rgba(255,255,255,.035); }
    .service-icon { width:42px; height:42px; margin-bottom:24px; }
    .service-num { position:absolute; top:24px; right:24px; font-family:'Cormorant Garamond',serif; font-size:.85rem; color:rgba(255,255,255,.08); }
    .service-card h3 { font-family:'Syne',sans-serif; font-size:.92rem; font-weight:600; letter-spacing:.04em; margin-bottom:11px; }
    .service-card p { font-size:.83rem; line-height:1.7; color:rgba(255,255,255,.36); }
    .service-tag-list { display:flex; flex-wrap:wrap; gap:7px; margin-top:20px; }
    .service-tag { font-size:.67rem; letter-spacing:.08em; padding:4px 11px; border:1px solid rgba(255,255,255,.09); color:rgba(255,255,255,.26); }

    /* INDUSTRIES */
    #industries { padding:140px 60px; background:rgba(255,255,255,.01); border-top:1px solid var(--border); }
    .industries-header { text-align:center; margin-bottom:78px; }
    .industries-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:2px; }
    .industry-item { padding:42px 26px; background:rgba(10,10,10,.9); border:1px solid var(--border); display:flex; flex-direction:column; align-items:flex-start; gap:16px; transition:all .35s; cursor:default; }
    .industry-item:hover { background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.16); transform:translateY(-4px); }
    .industry-icon { width:42px; height:42px; }
    .industry-item h4 { font-family:'Syne',sans-serif; font-size:.88rem; font-weight:600; letter-spacing:.04em; }
    .industry-item p { font-size:.79rem; color:rgba(255,255,255,.33); line-height:1.6; }

    /* WHY */
    #why { padding:140px 60px; border-top:1px solid var(--border); }
    .why-grid { display:grid; grid-template-columns:1fr 1fr; gap:100px; align-items:center; }
    .why-list { list-style:none; margin-top:38px; }
    .why-list li { display:flex; gap:18px; padding:20px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
    .why-list li:first-child { border-top:1px solid var(--border); }
    .why-icon { width:32px; height:32px; border:1px solid rgba(255,255,255,.14); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; color:rgba(255,255,255,.55); font-size:.75rem; }
    .why-list h4 { font-family:'Syne',sans-serif; font-size:.86rem; font-weight:600; margin-bottom:5px; }
    .why-list p { font-size:.82rem; color:rgba(255,255,255,.38); line-height:1.6; }
    .big-quote { font-family:'Cormorant Garamond',serif; font-size:clamp(1.6rem,3vw,2.5rem); font-weight:300; line-height:1.35; color:rgba(255,255,255,.72); }
    .big-quote em { font-style:italic; color:var(--pure); }
    .quote-source { margin-top:28px; font-size:.7rem; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.22); display:flex; align-items:center; gap:12px; }
    .quote-source::before { content:''; width:24px; height:1px; background:rgba(255,255,255,.22); }

    /* CONTACT */
    #contact { padding:140px 60px; background:rgba(255,255,255,.01); border-top:1px solid var(--border); }
    .contact-wrap { display:grid; grid-template-columns:1fr 1.2fr; gap:100px; align-items:start; }
    .contact-item { display:flex; align-items:center; gap:16px; padding:20px 0; border-bottom:1px solid var(--border); text-decoration:none; color:inherit; transition:all .3s; }
    .contact-item:hover .contact-item-text { color:var(--pure); }
    .contact-item:first-child { border-top:1px solid var(--border); margin-top:44px; }
    .contact-item-icon { width:38px; height:38px; border:1px solid rgba(255,255,255,.13); display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.55); font-size:.85rem; flex-shrink:0; }
    .contact-item-label { font-size:.67rem; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.22); margin-bottom:3px; }
    .contact-item-text { font-family:'Syne',sans-serif; font-size:.87rem; font-weight:500; color:rgba(255,255,255,.65); transition:color .3s; }
    .form-title { font-family:'Cormorant Garamond',serif; font-size:1.75rem; font-weight:400; margin-bottom:34px; }
    .form-title em { font-style:italic; color:rgba(255,255,255,.42); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
    .form-group { margin-bottom:13px; }
    .form-group label { display:block; font-size:.67rem; letter-spacing:.15em; text-transform:uppercase; color:rgba(255,255,255,.28); margin-bottom:8px; }
    .form-group input,.form-group select,.form-group textarea { width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); padding:13px 15px; color:var(--pure); font-family:'DM Sans',sans-serif; font-size:.87rem; outline:none; transition:border-color .3s; appearance:none; }
    .form-group input::placeholder,.form-group textarea::placeholder { color:rgba(255,255,255,.18); }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:rgba(255,255,255,.35); }
    .form-group textarea { resize:vertical; min-height:118px; }
    .form-group select option { background:#151515; }
    .form-status { display:none; padding:13px 17px; font-size:.84rem; margin-top:10px; }
    .form-status.success { display:block; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.18); color:rgba(255,255,255,.75); }
    .form-status.error { display:block; background:rgba(220,80,80,.07); border:1px solid rgba(220,80,80,.22); color:#e88; }
    .btn-submit { width:100%; padding:16px; background:var(--pure); color:var(--black); border:none; font-family:'Syne',sans-serif; font-size:.77rem; letter-spacing:.15em; text-transform:uppercase; font-weight:700; cursor:none; transition:all .3s; margin-top:8px; }
    .btn-submit:hover { opacity:.85; transform:translateY(-2px); }
    .btn-submit:disabled { opacity:.4; transform:none; }

    /* FOOTER */
    footer { padding:42px 60px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .footer-brand { font-family:'Syne',sans-serif; font-size:.77rem; font-weight:800; letter-spacing:.2em; text-transform:uppercase; color:var(--pure); }
    .footer-brand span { color:rgba(255,255,255,.28); font-weight:400; }
    .footer-copy { font-size:.7rem; color:rgba(255,255,255,.18); }
    .footer-links { display:flex; gap:30px; }
    .footer-links a { font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.22); text-decoration:none; transition:color .3s; }
    .footer-links a:hover { color:var(--pure); }

    /* ANIMATIONS */
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    @keyframes scrollAnim { from{left:-100%} to{left:100%} }
    .reveal { opacity:0; transform:translateY(28px); transition:opacity .8s cubic-bezier(.25,.46,.45,.94),transform .8s cubic-bezier(.25,.46,.45,.94); }
    .reveal.visible { opacity:1; transform:translateY(0); }

    /* RESPONSIVE */
    @media(max-width:1024px){
      nav{padding:24px 28px;} nav ul{display:none;} .lang-bar{padding:8px 28px 0;}
      #hero,#about,#services,#industries,#why,#contact{padding-left:28px;padding-right:28px;}
      #about{grid-template-columns:1fr;gap:56px;padding-top:100px;padding-bottom:100px;}
      #services,#industries,#why,#contact{padding-top:100px;padding-bottom:100px;}
      .services-grid{grid-template-columns:1fr;} .services-header{flex-direction:column;align-items:flex-start;gap:18px;}
      .industries-grid{grid-template-columns:repeat(2,1fr);}
      .why-grid{grid-template-columns:1fr;gap:56px;}
      .contact-wrap{grid-template-columns:1fr;gap:56px;}
      footer{flex-direction:column;gap:16px;text-align:center;padding:34px 28px;}
    }
    @media(max-width:600px){ .form-row{grid-template-columns:1fr;} .hero-title{font-size:3rem;} .about-stats{grid-template-columns:1fr 1fr;} .industries-grid{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- LANG -->
<div class="lang-bar">
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
  </div>
</div>

<!-- NAV -->
<nav>
  <a href="#hero" class="logo">
    <!--
      Zaze Studio mark — traced as one solid white polygon.
      Shape: chamfered rectangle outline with Z integrated.
      Outer edge = octagon. Inner cutout = Z-negative-space.
      The white border IS the Z: top strip, diagonal band, bottom strip,
      plus the four chamfered corner fills.
    -->
    <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path fill="white" fill-rule="evenodd" d="
        M18 4 L82 4 L96 18 L96 82 L82 96 L18 96 L4 82 L4 18 Z
        M32 18 L68 18 L82 32 L82 44 L36 68 L68 68 L68 82 L32 82 L18 68 L18 56 L64 32 L32 32 Z
      "/>
    </svg>
    <span class="logo-text">Zaze <span>Studio</span></span>
  </a>
  <ul>
    <li><a href="#about" data-i18n="nav_about">About</a></li>
    <li><a href="#services" data-i18n="nav_services">Services</a></li>
    <li><a href="#industries" data-i18n="nav_ind">Industries</a></li>
    <li><a href="#contact" class="nav-cta" data-i18n="nav_contact">Get in Touch</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-grid"></div>
  <div class="hero-glow"></div>
  <div class="hero-content">
    <div class="hero-eyebrow" data-i18n="hero_eyebrow">Web Design & Development Studio</div>
    <h1 class="hero-title">
      <span class="line" data-i18n="hero_l1">We Build</span>
      <span class="line"><em data-i18n="hero_l2a">Websites</em> <span data-i18n="hero_l2b">That</span></span>
      <span class="line" data-i18n="hero_l3">Work For You</span>
    </h1>
    <p class="hero-sub" data-i18n="hero_sub">From coffee shops to clinics, boutiques to barbershops — we craft fast, beautiful, professional websites that help your business grow.</p>
    <div class="hero-actions">
      <a href="#contact" class="btn-primary" data-i18n="hero_cta1">Start a Project</a>
      <a href="#services" cl
